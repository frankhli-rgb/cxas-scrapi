# ───────────────────────────────────────────────────────────────────
# set_large_party_phone
# ───────────────────────────────────────────────────────────────────
- name: phone_us_format
  tool: set_large_party_phone
  args:
    phone: "555-867-5309"
  expectations:
    response:
    - path: "$.result.stored"
      operator: equals
      value: true
    - path: "$.result.value"
      operator: equals
      value: "555-867-5309"

- name: phone_with_country_code
  tool: set_large_party_phone
  args:
    phone: "+1 (555) 867-5309"
  expectations:
    response:
    - path: "$.result.stored"
      operator: equals
      value: true

- name: phone_digits_only
  tool: set_large_party_phone
  args:
    phone: "5558675309"
  expectations:
    response:
    - path: "$.result.stored"
      operator: equals
      value: true

- name: phone_boundary_7_digits
  tool: set_large_party_phone
  args:
    phone: "867-5309"
  expectations:
    response:
    - path: "$.result.stored"
      operator: equals
      value: true

- name: phone_too_few_digits
  tool: set_large_party_phone
  args:
    phone: "12-3456"
  expectations:
    response:
    - path: "$.result.error"
      operator: equals
      value: true
    - path: "$.result.error_code"
      operator: equals
      value: "invalid_phone"
