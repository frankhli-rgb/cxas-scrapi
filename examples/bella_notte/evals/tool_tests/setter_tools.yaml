tests:
# ───────────────────────────────────────────────────────────────────
# set_party_size
# ───────────────────────────────────────────────────────────────────
- name: party_size_valid
  tool: set_party_size
  args:
    size: 4
  expectations:
    response:
    - path: "$.result.stored"
      operator: equals
      value: true
    - path: "$.result.value"
      operator: equals
      value: 4

- name: party_size_boundary_min
  tool: set_party_size
  args:
    size: 1
  expectations:
    response:
    - path: "$.result.stored"
      operator: equals
      value: true
    - path: "$.result.value"
      operator: equals
      value: 1

- name: party_size_boundary_max
  tool: set_party_size
  args:
    size: 8
  expectations:
    response:
    - path: "$.result.stored"
      operator: equals
      value: true
    - path: "$.result.value"
      operator: equals
      value: 8

- name: party_size_over_max
  tool: set_party_size
  args:
    size: 9
  expectations:
    response:
    - path: "$.result.error"
      operator: equals
      value: true
    - path: "$.result.error_code"
      operator: equals
      value: "out_of_range"

- name: party_size_zero
  tool: set_party_size
  args:
    size: 0
  expectations:
    response:
    - path: "$.result.error"
      operator: equals
      value: true
    - path: "$.result.error_code"
      operator: equals
      value: "out_of_range"

- name: party_size_negative
  tool: set_party_size
  args:
    size: -1
  expectations:
    response:
    - path: "$.result.error"
      operator: equals
      value: true
    - path: "$.result.error_code"
      operator: equals
      value: "out_of_range"

# ───────────────────────────────────────────────────────────────────
# set_preferred_date
# ───────────────────────────────────────────────────────────────────
- name: preferred_date_valid_future
  tool: set_preferred_date
  args:
    date: "2027-12-25"
  expectations:
    response:
    - path: "$.result.stored"
      operator: equals
      value: true
    - path: "$.result.value"
      operator: equals
      value: "2027-12-25"

- name: preferred_date_far_future
  tool: set_preferred_date
  args:
    date: "2028-06-15"
  expectations:
    response:
    - path: "$.result.stored"
      operator: equals
      value: true

- name: preferred_date_past
  tool: set_preferred_date
  args:
    date: "2020-01-01"
  expectations:
    response:
    - path: "$.result.error"
      operator: equals
      value: true
    - path: "$.result.error_code"
      operator: equals
      value: "past_date"

- name: preferred_date_invalid_format
  tool: set_preferred_date
  args:
    date: "June 5th"
  expectations:
    response:
    - path: "$.result.error"
      operator: equals
      value: true
    - path: "$.result.error_code"
      operator: equals
      value: "invalid_format"

- name: preferred_date_wrong_separator
  tool: set_preferred_date
  args:
    date: "2027/12/25"
  expectations:
    response:
    - path: "$.result.error"
      operator: equals
      value: true
    - path: "$.result.error_code"
      operator: equals
      value: "invalid_format"

# ───────────────────────────────────────────────────────────────────
# set_selected_time
# ───────────────────────────────────────────────────────────────────
- name: selected_time_evening
  tool: set_selected_time
  args:
    time: "18:00"
  expectations:
    response:
    - path: "$.result.stored"
      operator: equals
      value: true
    - path: "$.result.value"
      operator: equals
      value: "18:00"
    - path: "$.result.display_value"
      operator: equals
      value: "6:00 PM"

- name: selected_time_morning
  tool: set_selected_time
  args:
    time: "09:30"
  expectations:
    response:
    - path: "$.result.stored"
      operator: equals
      value: true
    - path: "$.result.display_value"
      operator: equals
      value: "9:30 AM"

- name: selected_time_midnight
  tool: set_selected_time
  args:
    time: "00:00"
  expectations:
    response:
    - path: "$.result.stored"
      operator: equals
      value: true
    - path: "$.result.display_value"
      operator: equals
      value: "12:00 AM"

- name: selected_time_noon
  tool: set_selected_time
  args:
    time: "12:00"
  expectations:
    response:
    - path: "$.result.stored"
      operator: equals
      value: true
    - path: "$.result.display_value"
      operator: equals
      value: "12:00 PM"

- name: selected_time_garbage
  tool: set_selected_time
  args:
    time: "dinnertime"
  expectations:
    response:
    - path: "$.result.error"
      operator: equals
      value: true
    - path: "$.result.error_code"
      operator: equals
      value: "not_available"

