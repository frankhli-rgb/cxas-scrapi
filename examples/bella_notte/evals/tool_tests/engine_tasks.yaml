# Slot filling engine: task firing, conditional slots, deferred slots
_config: &config
  slots:
  - name: welcome
    source: announce
    message: "Welcome to Bella Notte!"
    preempt: false
  - name: party_size
    source: ["event", "user"]
    event_key: party_size
    setter: set_party_size
    hint: "Party size"
    ask: "How many guests will be dining?"
    readback_fmt:
      type: plural
      one: guest
      other: guests
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        out_of_range: "Parties of 1 to 8 only."
        parse_error: "How many guests?"
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: large_party_phone
    source: user
    setter: set_large_party_phone
    hint: "Contact phone number (for parties of 5 or more)"
    condition: "lambda filled: int(filled.get('party_size', 0)) >= 5"
    ask: "What's the best contact number?"
    readback_fmt:
      type: prefix
      text: "contact phone"
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        invalid_phone: "Need at least 7 digits."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: preferred_date
    source: user
    setter: set_preferred_date
    hint: "Date"
    ask: "What date would you like to come in?"
    readback_fmt: date
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        invalid_format: "Please use YYYY-MM-DD."
        past_date: "That date is in the past."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: available_times
    source: "task:FindAvailableTimes"
  - name: selected_time
    source: user
    setter: set_selected_time
    hint: "Time"
    requires: ["available_times"]
    validate_against:
      response_field: display_value
      filled_slot: available_times
      error_code: not_available
    ask: "We have {available_times}. Which time?"
    readback_fmt: time
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        not_available: "That time isn't available."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: guest_name
    source: user
    setter: set_guest_name
    hint: "Name"
    ask: "What name for the reservation?"
    readback_fmt:
      type: prefix
      text: "under the name"
    requires_readback: true
    validation:
      max_retries: 3
      errors:
        empty_name: "I didn't catch the name."
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: special_requests
    source: user
    setter: set_special_requests
    hint: 'Special requests or "none"'
    ask: "Any special requests?"
    readback_fmt:
      type: none_sub
      default: "no special requests"
    requires_readback: true
  - name: confirmation_number
    source: "task:BookReservation"
  tasks:
  - name: FindAvailableTimes
    tool: find_available_times
    inputs: ["party_size", "preferred_date"]
    outputs:
      available_times: available_times
    success_check: success
    then_say: "We have {available_times}."
    on_failure:
      retry_say: "No availability. Try another date?"
      max_retries: 2
      clear_slots: ["preferred_date"]
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  - name: BookReservation
    tool: book_reservation
    inputs: ["party_size", "large_party_phone", "preferred_date", "selected_time", "guest_name", "special_requests"]
    readback_inputs: true
    outputs:
      confirmation_number: confirmation_number
    success_check: success
    terminal: true
    then_say: "Confirmed! Number: {confirmation_number}."
    on_failure:
      retry_say: "Let me try again."
      max_retries: 2
      on_exhaust:
        say: "Please call us at 555-0100."
        then: escalate
  confirm_transition_prefix: "Perfect!"
  readback_retry:
    max_retries: 2
    on_exhaust:
      say: "Please call us at 555-0100."
      then: escalate
  progress_stall:
    max_turns: 4
    on_exhaust:
      say: "Please call us at 555-0100."
      then: escalate

tests:
# ═══════════════════════════════════════════════════════════════════
# TASK FIRING
# ═══════════════════════════════════════════════════════════════════

- name: fire_find_available_times
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          party_size: 4
          preferred_date: "2027-06-01"
        pending: {}
        task_results: {}
        _last_state:
          filled:
            welcome: true
            party_size: 4
            preferred_date: "2027-06-01"
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.function_call.name"
      operator: equals
      value: "find_available_times"
    - path: "$.result.action.function_call.args.party_size"
      operator: equals
      value: 4
    - path: "$.result.action.function_call.args.preferred_date"
      operator: equals
      value: "2027-06-01"
    - path: "$.result.action.preempt"
      operator: equals
      value: true

- name: no_fire_when_input_missing
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          party_size: 4
        pending: {}
        task_results: {}
        _last_state:
          filled:
            welcome: true
            party_size: 4
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.function_call"
      operator: is_null
    - path: "$.result.action.message"
      operator: contains
      value: "What date"

- name: task_success_terminal_completes
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          party_size: 2
          preferred_date: "2027-06-01"
          available_times: "6:00 PM"
          selected_time: "18:00"
          guest_name: "Maria"
          special_requests: "none"
          confirmation_number: "BN-1234"
        pending: {}
        task_results:
          FindAvailableTimes:
            success: true
            available_times: "6:00 PM"
          BookReservation:
            success: true
            confirmation_number: "BN-1234"
        _task_just_completed: "BookReservation"
        _last_state:
          filled:
            welcome: true
            party_size: 2
            preferred_date: "2027-06-01"
            available_times: "6:00 PM"
            selected_time: "18:00"
            guest_name: "Maria"
            special_requests: "none"
            confirmation_number: "BN-1234"
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.sm.status"
      operator: equals
      value: "complete"
    - path: "$.result.action.preempt"
      operator: equals
      value: true
    - path: "$.result.action.message"
      operator: contains
      value: "BN-1234"

- name: task_failure_retries
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          party_size: 4
          preferred_date: "2027-06-01"
        pending: {}
        task_results:
          FindAvailableTimes:
            success: false
        _task_just_completed: "FindAvailableTimes"
        _retries: {}
        _last_state:
          filled:
            welcome: true
            party_size: 4
            preferred_date: "2027-06-01"
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.preempt"
      operator: equals
      value: true
    - path: "$.result.action.message"
      operator: contains
      value: "No availability"

- name: task_failure_exhaust_escalates
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          party_size: 4
          preferred_date: "2027-06-01"
        pending: {}
        task_results:
          FindAvailableTimes:
            success: false
        _task_just_completed: "FindAvailableTimes"
        _retries:
          FindAvailableTimes: 2
        _last_state:
          filled:
            welcome: true
            party_size: 4
            preferred_date: "2027-06-01"
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.sm.status"
      operator: equals
      value: "escalated"
    - path: "$.result.action.preempt"
      operator: equals
      value: true
    - path: "$.result.action.message"
      operator: contains
      value: "555-0100"

# ═══════════════════════════════════════════════════════════════════
# CONDITIONAL SLOTS
# ═══════════════════════════════════════════════════════════════════

- name: conditional_phone_inactive_small_party
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          party_size: 3
        pending: {}
        _last_state:
          filled:
            welcome: true
            party_size: 3
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.hide_tools"
      operator: contains
      value: "set_large_party_phone"

- name: conditional_phone_active_large_party
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          party_size: 5
        pending: {}
        _last_state:
          filled:
            welcome: true
            party_size: 5
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.message"
      operator: contains
      value: "contact"

- name: conditional_skip_for_task_small_party
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          party_size: 2
          preferred_date: "2027-06-01"
          available_times: "6:00 PM"
          selected_time: "18:00"
          guest_name: "Maria"
          special_requests: "none"
        pending: {}
        task_results:
          FindAvailableTimes:
            success: true
            available_times: "6:00 PM"
        _last_state:
          filled:
            welcome: true
            party_size: 2
            preferred_date: "2027-06-01"
            available_times: "6:00 PM"
            selected_time: "18:00"
            guest_name: "Maria"
            special_requests: "none"
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.action.function_call.name"
      operator: equals
      value: "book_reservation"

# ═══════════════════════════════════════════════════════════════════
# DEFERRED SLOTS
# ═══════════════════════════════════════════════════════════════════

- name: deferred_slot_routed_to_deferred
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          party_size: 4
          preferred_date: "2027-06-01"
          available_times: "6:00 PM"
          selected_time: "18:00"
        pending:
          guest_name: "Maria"
        task_results:
          FindAvailableTimes:
            success: true
            available_times: "6:00 PM"
        _last_state:
          filled:
            welcome: true
            party_size: 4
            preferred_date: "2027-06-01"
            available_times: "6:00 PM"
            selected_time: "18:00"
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.sm.deferred.guest_name"
      operator: equals
      value: "Maria"

- name: deferred_group_promotes_when_ready
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
          available_times: "6:00 PM"
        pending: {}
        deferred:
          party_size: 2
          preferred_date: "2027-06-01"
          selected_time: "18:00"
          guest_name: "Maria"
          special_requests: "none"
        task_results:
          FindAvailableTimes:
            success: true
            available_times: "6:00 PM"
        _last_state:
          filled:
            welcome: true
            available_times: "6:00 PM"
          pending: {}
          deferred:
            party_size: 2
            preferred_date: "2027-06-01"
            selected_time: "18:00"
            guest_name: "Maria"
            special_requests: "none"
      last_user_text: ""
  expectations:
    response:
    - path: "$.result.sm.pending.party_size"
      operator: equals
      value: 2
    - path: "$.result.sm.pending.guest_name"
      operator: equals
      value: "Maria"

- name: deferred_hint_in_si_suffix
  tool: slot_filling_engine
  args:
    input_data:
      raw_config: *config
      sm:
        _events_checked: true
        filled:
          welcome: true
        pending: {}
        deferred:
          party_size: 4
        task_results: {}
        _last_state:
          filled:
            welcome: true
          pending: {}
          deferred: {}
      last_user_text: ""
  expectations:
