tests:
# ───────────────────────────────────────────────────────────────────
# find_available_times
# ───────────────────────────────────────────────────────────────────
- name: find_times_party_of_2
  tool: find_available_times
  args:
    party_size: 2
    preferred_date: "2027-06-01"
  expectations:
    response:
    - path: "$.result.success"
      operator: equals
      value: true
    - path: "$.result.available_times"
      operator: contains
      value: "6:00 PM"
    - path: "$.result.available_times"
      operator: contains
      value: "7:30 PM"
    - path: "$.result.available_times"
      operator: contains
      value: "9:00 PM"

- name: find_times_party_of_4
  tool: find_available_times
  args:
    party_size: 4
    preferred_date: "2027-06-01"
  expectations:
    response:
    - path: "$.result.success"
      operator: equals
      value: true
    - path: "$.result.available_times"
      operator: contains
      value: "7:00 PM"
    - path: "$.result.available_times"
      operator: contains
      value: "8:30 PM"

- name: find_times_party_of_6_single_slot
  tool: find_available_times
  args:
    party_size: 6
    preferred_date: "2027-06-01"
  expectations:
    response:
    - path: "$.result.success"
      operator: equals
      value: true
    - path: "$.result.available_times"
      operator: equals
      value: "6:00 PM"

- name: find_times_party_of_3_default_fallback
  tool: find_available_times
  args:
    party_size: 3
    preferred_date: "2027-06-01"
  expectations:
    response:
    - path: "$.result.success"
      operator: equals
      value: true
    - path: "$.result.available_times"
      operator: contains
      value: "6:00 PM"

# ───────────────────────────────────────────────────────────────────
# book_reservation
# ───────────────────────────────────────────────────────────────────
- name: book_reservation_standard
  tool: book_reservation
  args:
    party_size: 4
    preferred_date: "2027-06-01"
    selected_time: "19:00"
    guest_name: "Maria Rossi"
    special_requests: "none"
  expectations:
    response:
    - path: "$.result.success"
      operator: equals
      value: true
    - path: "$.result.confirmation_number"
      operator: is_not_null
    - path: "$.result.confirmation_number"
      operator: contains
      value: "BN-"

- name: book_reservation_large_party
  tool: book_reservation
  args:
    party_size: 6
    preferred_date: "2027-06-01"
    selected_time: "18:00"
    guest_name: "Giovanni"
    special_requests: "Wheelchair accessible"
    large_party_phone: "555-867-5309"
  expectations:
    response:
    - path: "$.result.success"
      operator: equals
      value: true
    - path: "$.result.confirmation_number"
      operator: is_not_null

- name: book_reservation_deterministic
  tool: book_reservation
  args:
    party_size: 2
    preferred_date: "2027-07-04"
    selected_time: "19:30"
    guest_name: "Test User"
    special_requests: "no"
  expectations:
    response:
    - path: "$.result.success"
      operator: equals
      value: true
    - path: "$.result.confirmation_number"
      operator: is_not_null
