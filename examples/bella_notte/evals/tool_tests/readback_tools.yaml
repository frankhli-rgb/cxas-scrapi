tests:
# ───────────────────────────────────────────────────────────────────
# confirm_pending
# ───────────────────────────────────────────────────────────────────
- name: confirm_pending_two_slots
  tool: confirm_pending
  context:
    state:
      sm:
        pending:
          party_size: 4
          guest_name: "Maria"
        filled: {}
  expectations:
    response:
    - path: "$.result.stored"
      operator: equals
      value: true
    - path: "$.result.committed"
      operator: length_equals
      value: 2

- name: confirm_pending_single_slot
  tool: confirm_pending
  context:
    state:
      sm:
        pending:
          party_size: 4
        filled:
          preferred_date: "2027-06-01"
  expectations:
    response:
    - path: "$.result.stored"
      operator: equals
      value: true
    - path: "$.result.committed"
      operator: length_equals
      value: 1

- name: confirm_pending_empty_error
  tool: confirm_pending
  context:
    state:
      sm:
        pending: {}
        filled:
          party_size: 4
  expectations:
    response:
    - path: "$.result.error"
      operator: equals
      value: true

# ───────────────────────────────────────────────────────────────────
# reject_pending
# ───────────────────────────────────────────────────────────────────
- name: reject_pending_with_data
  tool: reject_pending
  context:
    state:
      sm:
        pending:
          party_size: 4
        filled: {}
  expectations:
    response:
    - path: "$.result.stored"
      operator: equals
      value: true

- name: reject_pending_empty
  tool: reject_pending
  context:
    state:
      sm:
        pending: {}
        filled: {}
  expectations:
    response:
    - path: "$.result.stored"
      operator: equals
      value: true
