# Auth routing golden - verifies correct agent transfer
conversations:
  - conversation: "auth-routing-happy-path"
    priority: P0
    tags: [auth, routing]
    common_session_parameters:
      x5: "5551234567"
    turns:
      - user: "Hi, I need help with my bill"
        agent: "I'd be happy to help you with your billing question. Let me pull up your account."
        tool_calls:
          - action: lookup_account
            parameters:
              phone_number: "5551234567"
              lookup_type: "billing"
      - user: "Why was I charged $45.99?"
        agent: "I can see your recent charges. Let me transfer you to our billing specialist who can review the $45.99 charge in detail."
        tool_calls:
          - action: transfer_to_agent
            parameters:
              agent: billing_agent
              reason: "Customer inquiry about specific charge amount"
