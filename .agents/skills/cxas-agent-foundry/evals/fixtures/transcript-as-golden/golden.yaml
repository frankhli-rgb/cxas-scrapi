name: balance_check_happy_path
type: golden
expected_pass: true

conversation:
  - role: user
    content: "Hi there, I'd like to check my balance please"
  - role: agent
    content: "Hi! Sure thing, I'd be happy to help you with that. Let me just pull up your account details real quick."
    # ^ Filler phrases like "sure thing" and "real quick" are transcript artifacts.
    #   A different model run will phrase this differently and fail string matching.
  - role: tool_call
    name: get_balance
    args:
      msisdn: "27831234567"
      include_bundles: true
    # ^ Hardcoded msisdn only matches one test profile. A sim with a different
    #   profile (27839876543) will call get_balance with different args -> FAIL
  - role: tool_response
    content: '{"airtime": "R45.20", "data": "350MB"}'
  - role: agent
    content: "Great news! Your current airtime balance is R45.20 and you have 350MB of data remaining. Is there anything else I can help you with today?"
    # ^ "Great news!" is tone-specific. "R45.20 and 350MB" are profile-specific values.

expectations:
  tools_called: [get_balance]
  response_contains: ["R45.20", "350MB"]
  # ^ These expectations are profile-specific — they only pass for msisdn 27831234567
