# Golden eval with tool call that keeps failing on the summary parameter.
# The summary text varies each run because the LLM paraphrases it,
# but the tool call itself (action + core args) is correct.
conversations:
  - conversation: "escalation-with-payload"
    priority: P0
    common_session_parameters:
      x5: "5559876543"
    turns:
      - user: "I want to speak to a manager right now"
        agent: "I understand you'd like to speak with a manager. Let me transfer you right away."
        tool_calls:
          - action: payload_update_tool
            parameters:
              # This field varies each run — LLM summarizes differently
              summary: "Customer requested to speak with a manager immediately"
              escalation_reason: "Customer requested live agent"
              main_topic: "Customer Issue"
          - action: end_session
            parameters:
              end_call: true
