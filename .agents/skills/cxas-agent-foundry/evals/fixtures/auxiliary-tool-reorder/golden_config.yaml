name: escalation_with_context_update
type: golden
flow: escalation

conversation:
  - role: user
    content: "I've been on hold for 30 minutes, I want to speak to a manager"
  - role: agent
    content: "I understand your frustration. Let me escalate this for you right away."

expectations:
  tool_calls:
    - name: update_slots
      args:
        slot: escalation_reason
        value: "customer_request_manager"
    - name: payload_update
      args:
        key: "priority"
        value: "high"
    - name: end_session
      args:
        disposition: "escalated"
  # BUG: tool_calls is evaluated as an ordered list.
  # The agent sometimes calls payload_update before update_slots
  # because the instruction doesn't specify order and the model
  # treats them as independent operations.
  #
  # Suggested fix:
  # tool_calls_unordered: [update_slots, payload_update]
  # tool_calls_ordered_suffix: [end_session]
