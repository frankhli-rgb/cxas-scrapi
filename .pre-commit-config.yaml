repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
    -   id: trail-whitespace
    -   id: end-of-file-fixer
#    -   id: check-yaml
#    -   id: check-added-large-files

-   repo: local
    hooks:
    -   id: pylint
        name: pylint
        entry: pylint
        language: system
        types: [python]
        args:
            - --rcfile=.pylintrc
            - src/
        always_run: true
        pass_filenames: false

    -   id: pytest
        name: pytest
        entry: pytest
        language: system
        types: [python]
        args:
            - tests/
        always_run: true
        pass_filenames: false
