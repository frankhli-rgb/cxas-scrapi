<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 520" width="1060" height="520">
  <!-- svg-source:excalidraw -->
  <rect x="0" y="0" width="1060" height="520" fill="#ffffff"/>

  <defs>
    <marker id="cd" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#868e96"/>
    </marker>
    <marker id="cd-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67700"/>
    </marker>
    <marker id="cd-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b8a3e"/>
    </marker>
  </defs>

  <!-- Row 1: Announce + first user slots -->
  <!-- Welcome (announce) -->
  <rect x="30" y="40" width="100" height="42" rx="8" ry="8" fill="#e8d5f5" stroke="#7048e8" stroke-width="2"/>
  <text x="80" y="66" font-family="Roboto Mono, monospace" font-size="11" fill="#1e1e1e" text-anchor="middle">welcome</text>
  <text x="80" y="30" font-family="Google Sans, sans-serif" font-size="10" fill="#7048e8" text-anchor="middle">announce</text>

  <!-- party_size -->
  <rect x="160" y="40" width="120" height="42" rx="8" ry="8" fill="#a5d8ff" stroke="#1c7ed6" stroke-width="2"/>
  <text x="220" y="66" font-family="Roboto Mono, monospace" font-size="11" fill="#1e1e1e" text-anchor="middle">party_size</text>
  <text x="220" y="30" font-family="Google Sans, sans-serif" font-size="10" fill="#1c7ed6" text-anchor="middle">event | user</text>

  <!-- large_party_phone (conditional) -->
  <rect x="310" y="40" width="170" height="42" rx="8" ry="8" fill="#a5d8ff" stroke="#1c7ed6" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="395" y="66" font-family="Roboto Mono, monospace" font-size="10" fill="#1e1e1e" text-anchor="middle">large_party_phone</text>
  <text x="395" y="30" font-family="Google Sans, sans-serif" font-size="10" fill="#fab005" text-anchor="middle">conditional (≥5)</text>

  <!-- preferred_date -->
  <rect x="510" y="40" width="140" height="42" rx="8" ry="8" fill="#a5d8ff" stroke="#1c7ed6" stroke-width="2"/>
  <text x="580" y="66" font-family="Roboto Mono, monospace" font-size="11" fill="#1e1e1e" text-anchor="middle">preferred_date</text>

  <!-- Condition arrow from party_size to large_party_phone -->
  <path d="M 280 52 Q 295 35 308 52" fill="none" stroke="#fab005" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#cd)"/>

  <!-- Arrows: party_size, preferred_date → FindAvailableTimes -->
  <line x1="220" y1="82" x2="340" y2="158" stroke="#868e96" stroke-width="1.5" marker-end="url(#cd)"/>
  <line x1="580" y1="82" x2="440" y2="158" stroke="#868e96" stroke-width="1.5" marker-end="url(#cd)"/>

  <!-- FindAvailableTimes task -->
  <polygon points="300,185 400,155 500,185 400,215" fill="#ffd8a8" stroke="#e67700" stroke-width="2"/>
  <text x="400" y="190" font-family="Roboto Mono, monospace" font-size="11" fill="#1e1e1e" text-anchor="middle">FindAvailableTimes</text>

  <!-- available_times (task-sourced) -->
  <rect x="540" y="165" width="150" height="42" rx="8" ry="8" fill="#b2f2bb" stroke="#2b8a3e" stroke-width="2"/>
  <text x="615" y="191" font-family="Roboto Mono, monospace" font-size="11" fill="#1e1e1e" text-anchor="middle">available_times</text>
  <text x="615" y="155" font-family="Google Sans, sans-serif" font-size="10" fill="#2b8a3e" text-anchor="middle">task-sourced</text>

  <!-- Arrow: task → available_times -->
  <line x1="500" y1="185" x2="538" y2="185" stroke="#e67700" stroke-width="1.5" marker-end="url(#cd-orange)"/>

  <!-- Row 2: Post-task user slots -->
  <!-- selected_time -->
  <rect x="730" y="40" width="130" height="42" rx="8" ry="8" fill="#a5d8ff" stroke="#1c7ed6" stroke-width="2"/>
  <text x="795" y="66" font-family="Roboto Mono, monospace" font-size="11" fill="#1e1e1e" text-anchor="middle">selected_time</text>

  <!-- Arrow: available_times → selected_time (requires) -->
  <path d="M 640 165 Q 720 105 728 65" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#cd)"/>
  <text x="700" y="110" font-family="Google Sans, sans-serif" font-size="10" fill="#868e96" font-style="italic">requires</text>

  <!-- guest_name -->
  <rect x="890" y="40" width="120" height="42" rx="8" ry="8" fill="#a5d8ff" stroke="#1c7ed6" stroke-width="2"/>
  <text x="950" y="66" font-family="Roboto Mono, monospace" font-size="11" fill="#1e1e1e" text-anchor="middle">guest_name</text>

  <!-- special_requests -->
  <rect x="160" y="280" width="150" height="42" rx="8" ry="8" fill="#a5d8ff" stroke="#1c7ed6" stroke-width="2"/>
  <text x="235" y="306" font-family="Roboto Mono, monospace" font-size="10" fill="#1e1e1e" text-anchor="middle">special_requests</text>

  <!-- BookReservation task -->
  <polygon points="440,360 570,320 700,360 570,400" fill="#ffd8a8" stroke="#e67700" stroke-width="2"/>
  <text x="570" y="365" font-family="Roboto Mono, monospace" font-size="11" fill="#1e1e1e" text-anchor="middle">BookReservation</text>

  <!-- Arrows: all user slots → BookReservation -->
  <line x1="220" y1="82" x2="490" y2="325" stroke="#868e96" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="395" y1="82" x2="510" y2="325" stroke="#868e96" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="580" y1="82" x2="540" y2="325" stroke="#868e96" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="795" y1="82" x2="600" y2="325" stroke="#868e96" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="950" y1="82" x2="630" y2="325" stroke="#868e96" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="235" y1="322" x2="490" y2="355" stroke="#868e96" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- confirmation_number (task-sourced) -->
  <rect x="740" y="340" width="190" height="42" rx="8" ry="8" fill="#b2f2bb" stroke="#2b8a3e" stroke-width="2"/>
  <text x="835" y="366" font-family="Roboto Mono, monospace" font-size="11" fill="#1e1e1e" text-anchor="middle">confirmation_number</text>

  <!-- Arrow: BookReservation → confirmation_number -->
  <line x1="700" y1="360" x2="738" y2="360" stroke="#e67700" stroke-width="1.5" marker-end="url(#cd-orange)"/>

  <!-- Terminal badge -->
  <rect x="545" y="405" width="60" height="20" rx="4" ry="4" fill="#c92a2a"/>
  <text x="575" y="419" font-family="Google Sans, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="600">terminal</text>

  <!-- Readback badge -->
  <rect x="540" y="300" width="70" height="18" rx="4" ry="4" fill="#d0bfff" stroke="#7048e8" stroke-width="1"/>
  <text x="575" y="313" font-family="Google Sans, sans-serif" font-size="9" fill="#7048e8" text-anchor="middle">deferred ✓</text>

  <!-- Legend -->
  <rect x="30" y="460" width="16" height="16" rx="3" ry="3" fill="#a5d8ff" stroke="#1c7ed6" stroke-width="1"/>
  <text x="52" y="473" font-family="Google Sans, sans-serif" font-size="12" fill="#666666">User slot</text>

  <rect x="140" y="460" width="16" height="16" rx="3" ry="3" fill="#b2f2bb" stroke="#2b8a3e" stroke-width="1"/>
  <text x="162" y="473" font-family="Google Sans, sans-serif" font-size="12" fill="#666666">Task slot</text>

  <rect x="250" y="460" width="16" height="16" rx="3" ry="3" fill="#e8d5f5" stroke="#7048e8" stroke-width="1"/>
  <text x="272" y="473" font-family="Google Sans, sans-serif" font-size="12" fill="#666666">Announce</text>

  <polygon points="355,468 365,460 375,468 365,476" fill="#ffd8a8" stroke="#e67700" stroke-width="1"/>
  <text x="383" y="473" font-family="Google Sans, sans-serif" font-size="12" fill="#666666">Task</text>

  <rect x="440" y="460" width="40" height="16" rx="3" ry="3" fill="none" stroke="#1c7ed6" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="488" y="473" font-family="Google Sans, sans-serif" font-size="12" fill="#666666">Conditional</text>
</svg>
