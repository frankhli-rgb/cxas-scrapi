<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" width="1000" height="460">
  <!-- svg-source:excalidraw -->
  <rect x="0" y="0" width="1000" height="460" fill="#ffffff"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#868e96"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67700"/>
    </marker>
  </defs>

  <!-- User-sourced slots (blue) -->
  <rect x="30" y="50" width="130" height="46" rx="8" ry="8" fill="#a5d8ff" stroke="#1c7ed6" stroke-width="2"/>
  <text x="95" y="79" font-family="Roboto Mono, monospace" font-size="13" fill="#1e1e1e" text-anchor="middle">party_size</text>

  <rect x="190" y="50" width="150" height="46" rx="8" ry="8" fill="#a5d8ff" stroke="#1c7ed6" stroke-width="2"/>
  <text x="265" y="79" font-family="Roboto Mono, monospace" font-size="13" fill="#1e1e1e" text-anchor="middle">preferred_date</text>

  <rect x="555" y="50" width="140" height="46" rx="8" ry="8" fill="#a5d8ff" stroke="#1c7ed6" stroke-width="2"/>
  <text x="625" y="79" font-family="Roboto Mono, monospace" font-size="13" fill="#1e1e1e" text-anchor="middle">selected_time</text>

  <rect x="720" y="50" width="120" height="46" rx="8" ry="8" fill="#a5d8ff" stroke="#1c7ed6" stroke-width="2"/>
  <text x="780" y="79" font-family="Roboto Mono, monospace" font-size="13" fill="#1e1e1e" text-anchor="middle">guest_name</text>

  <rect x="865" y="50" width="120" height="46" rx="8" ry="8" fill="#a5d8ff" stroke="#1c7ed6" stroke-width="2"/>
  <text x="925" y="79" font-family="Roboto Mono, monospace" font-size="12" fill="#1e1e1e" text-anchor="middle">special_requests</text>

  <!-- FindAvailableTimes task (orange diamond) -->
  <polygon points="220,185 340,155 460,185 340,215" fill="#ffd8a8" stroke="#e67700" stroke-width="2"/>
  <text x="340" y="190" font-family="Roboto Mono, monospace" font-size="12" fill="#1e1e1e" text-anchor="middle">FindAvailableTimes</text>

  <!-- Task-sourced slot: available_times (green) -->
  <rect x="500" y="162" width="150" height="46" rx="8" ry="8" fill="#b2f2bb" stroke="#2b8a3e" stroke-width="2"/>
  <text x="575" y="191" font-family="Roboto Mono, monospace" font-size="13" fill="#1e1e1e" text-anchor="middle">available_times</text>

  <!-- Arrows: slots → FindAvailableTimes -->
  <line x1="95" y1="96" x2="280" y2="155" stroke="#868e96" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="265" y1="96" x2="310" y2="155" stroke="#868e96" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow: FindAvailableTimes → available_times -->
  <line x1="460" y1="185" x2="498" y2="185" stroke="#e67700" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- Arrow: available_times → selected_time (requires dependency) -->
  <line x1="575" y1="162" x2="610" y2="96" stroke="#868e96" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arr)"/>
  <text x="610" y="135" font-family="Google Sans, sans-serif" font-size="11" fill="#868e96" font-style="italic">requires</text>

  <!-- BookReservation task (orange diamond) -->
  <polygon points="340,335 480,300 620,335 480,370" fill="#ffd8a8" stroke="#e67700" stroke-width="2"/>
  <text x="480" y="340" font-family="Roboto Mono, monospace" font-size="12" fill="#1e1e1e" text-anchor="middle">BookReservation</text>

  <!-- Task-sourced slot: confirmation_number (green) -->
  <rect x="665" y="312" width="190" height="46" rx="8" ry="8" fill="#b2f2bb" stroke="#2b8a3e" stroke-width="2"/>
  <text x="760" y="341" font-family="Roboto Mono, monospace" font-size="12" fill="#1e1e1e" text-anchor="middle">confirmation_number</text>

  <!-- Arrow: BookReservation → confirmation_number -->
  <line x1="620" y1="335" x2="663" y2="335" stroke="#e67700" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- Arrows: all slots → BookReservation -->
  <line x1="95" y1="96" x2="400" y2="305" stroke="#868e96" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="265" y1="96" x2="430" y2="305" stroke="#868e96" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="625" y1="96" x2="510" y2="305" stroke="#868e96" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="780" y1="96" x2="530" y2="305" stroke="#868e96" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="925" y1="96" x2="560" y2="305" stroke="#868e96" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Terminal badge -->
  <rect x="455" y="375" width="60" height="22" rx="4" ry="4" fill="#c92a2a"/>
  <text x="485" y="390" font-family="Google Sans, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="600">terminal</text>

  <!-- Legend -->
  <rect x="30" y="420" width="18" height="18" rx="3" ry="3" fill="#a5d8ff" stroke="#1c7ed6" stroke-width="1"/>
  <text x="55" y="434" font-family="Google Sans, sans-serif" font-size="13" fill="#666666">User-sourced slot</text>

  <rect x="210" y="420" width="18" height="18" rx="3" ry="3" fill="#b2f2bb" stroke="#2b8a3e" stroke-width="1"/>
  <text x="235" y="434" font-family="Google Sans, sans-serif" font-size="13" fill="#666666">Task-sourced slot</text>

  <polygon points="399,429 410,420 421,429 410,438" fill="#ffd8a8" stroke="#e67700" stroke-width="1"/>
  <text x="430" y="434" font-family="Google Sans, sans-serif" font-size="13" fill="#666666">Task</text>

  <line x1="510" y1="429" x2="545" y2="429" stroke="#868e96" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="555" y="434" font-family="Google Sans, sans-serif" font-size="13" fill="#666666">input / requires</text>
</svg>
