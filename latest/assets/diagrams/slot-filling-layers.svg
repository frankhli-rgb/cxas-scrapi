<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <!-- svg-source:excalidraw -->
  <rect x="0" y="0" width="820" height="480" fill="#ffffff"/>

  <!-- Configuration layer -->
  <rect x="80" y="40" width="560" height="100" rx="12" ry="12" fill="#ffd8a8" stroke="#e67700" stroke-width="2"/>
  <text x="360" y="75" font-family="Google Sans, Segoe UI, sans-serif" font-size="22" font-weight="600" fill="#1e1e1e" text-anchor="middle">Configuration</text>
  <text x="360" y="108" font-family="Google Sans, Segoe UI, sans-serif" font-size="15" fill="#666666" text-anchor="middle">Slots, tasks, validation rules, retry policies</text>

  <!-- Engine layer -->
  <rect x="80" y="180" width="560" height="100" rx="12" ry="12" fill="#b2f2bb" stroke="#2b8a3e" stroke-width="2"/>
  <text x="360" y="215" font-family="Google Sans, Segoe UI, sans-serif" font-size="22" font-weight="600" fill="#1e1e1e" text-anchor="middle">Slot Filling Engine</text>
  <text x="360" y="248" font-family="Google Sans, Segoe UI, sans-serif" font-size="15" fill="#666666" text-anchor="middle">Deterministic state machine — decides what to do next</text>

  <!-- LLM layer -->
  <rect x="80" y="320" width="560" height="100" rx="12" ry="12" fill="#a5d8ff" stroke="#1c7ed6" stroke-width="2"/>
  <text x="360" y="355" font-family="Google Sans, Segoe UI, sans-serif" font-size="22" font-weight="600" fill="#1e1e1e" text-anchor="middle">The LLM</text>
  <text x="360" y="388" font-family="Google Sans, Segoe UI, sans-serif" font-size="15" fill="#666666" text-anchor="middle">Language interface — parses input, generates responses</text>

  <!-- Arrows -->
  <line x1="360" y1="140" x2="360" y2="180" stroke="#868e96" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="360" y1="280" x2="360" y2="320" stroke="#868e96" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Side annotations -->
  <text x="665" y="95" font-family="Google Sans, Segoe UI, sans-serif" font-size="14" fill="#e67700" font-style="italic">You write this</text>
  <text x="665" y="235" font-family="Google Sans, Segoe UI, sans-serif" font-size="14" fill="#2b8a3e" font-style="italic">Framework runs this</text>
  <text x="665" y="375" font-family="Google Sans, Segoe UI, sans-serif" font-size="14" fill="#1c7ed6" font-style="italic">Platform provides this</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#868e96"/>
    </marker>
  </defs>
</svg>
