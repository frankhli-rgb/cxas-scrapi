name: CES Gemmaclaw CI

on:
  push:
    branches: [ main, feat-cesgemmaclaw ]
    paths:
      - 'ces_gemmaclaw/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'ces_gemmaclaw/**'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ces_gemmaclaw

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ces_gemmaclaw/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build CLI
        run: npm run build

      - name: Run Unit Tests
        run: npm run test
